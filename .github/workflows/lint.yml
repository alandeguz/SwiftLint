name: Lint

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-swift:
    name: Swift
    runs-on: ubuntu-24.04 # "Noble Numbat"
    steps:
      - &checkout-step
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: ./.github/actions/bazel-linux
        name: Run SwiftLint with Bazel
        with:
          mode: run
          target: //:swiftlint
          args: lint --reporter github-actions-logging --strict 2> /dev/null
        env:
          CI_BAZELRC_FILE_CONTENT: ${{ secrets.CI_BAZELRC_FILE_CONTENT }}
  lint-markdown:
    name: Markdown
    runs-on: ubuntu-slim
    steps:
      - *checkout-step
      - name: Lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            CHANGELOG.md
            CONTRIBUTING.md
            README.md
  lint-actions:
    name: Actions
    runs-on: ubuntu-24.04
    steps:
      - *checkout-step
      - name: Register problem matcher
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/.github/actionlint-matcher.json > actionlint-matcher.json
          echo "::add-matcher::actionlint-matcher.json"
      - name: Lint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -color
